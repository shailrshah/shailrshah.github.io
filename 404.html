<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 — shail.dev</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0d0f17; --text: #c9d1f0; --muted: #3d4466; --dim: #5a6490;
      --cyan: #63d4f5; --green: #7ef083; --purple: #c792ea; --yellow: #ffcb6b; --coral: #ff6b8a;
      --border: #1e2133; --font: 'JetBrains Mono', monospace;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: linear-gradient(to bottom, #0b0b2b, #1b2735 70%, #090a0f);
      color: var(--text); font-family: var(--font); font-size: 14px;
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
    }
    body::before {
      content: ''; position: fixed; inset: 0; pointer-events: none; z-index: 9999;
      background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.04) 2px, rgba(0,0,0,0.04) 4px);
    }
    .terminal {
      background: rgba(19,21,31,0.85); border: 1px solid var(--border);
      border-radius: 10px; width: 90%; max-width: 600px;
      box-shadow: 0 30px 80px rgba(0,0,0,0.7);
    }
    .titlebar {
      background: #0a0c14; padding: 12px 16px; display: flex; align-items: center;
      gap: 14px; border-bottom: 1px solid var(--border); border-radius: 10px 10px 0 0;
    }
    .dots { display: flex; gap: 7px; }
    .dot { width: 14px; height: 14px; border-radius: 50%; }
    .dot-red    { background: #ff5f57; }
    .dot-yellow { background: #febc2e; }
    .dot-green  { background: #28c840; }
    .titlebar-label { flex: 1; text-align: center; color: var(--muted); font-size: 12px; }
    .body { padding: 28px 32px 36px; line-height: 1.8; }
    .prompt { display: flex; align-items: center; gap: 0; margin-bottom: 20px; }
    .p-user { color: var(--green); font-weight: 600; }
    .p-at   { color: var(--muted); }
    .p-host { color: var(--cyan); font-weight: 600; }
    .p-sep  { color: var(--muted); margin: 0 4px; }
    .p-dir  { color: #82aaff; }
    .p-sym  { color: var(--yellow); margin: 0 8px; font-weight: 700; }
    .error  { color: var(--coral); margin-bottom: 6px; }
    .big    { font-size: 4rem; font-weight: 700; color: var(--purple); line-height: 1; margin-bottom: 12px;
              text-shadow: 0 0 40px rgba(199,146,234,0.4); }
    .msg    { color: var(--dim); margin-bottom: 24px; font-size: 13px; }
    .links  { display: flex; gap: 12px; flex-wrap: wrap; }
    .btn {
      background: rgba(99,212,245,0.08); border: 1px solid rgba(99,212,245,0.2);
      color: var(--cyan); font-family: var(--font); font-size: 13px;
      padding: 6px 16px; border-radius: 4px; cursor: pointer; text-decoration: none;
      transition: all 0.15s;
    }
    .btn:hover { background: rgba(99,212,245,0.18); border-color: rgba(99,212,245,0.5); }
  </style>
</head>
<body>
  <div class="terminal">
    <div class="titlebar">
      <div class="dots">
        <div class="dot dot-red"></div>
        <div class="dot dot-yellow"></div>
        <div class="dot dot-green"></div>
      </div>
      <div class="titlebar-label">guest@shail.dev — bash</div>
    </div>
    <div class="body">
      <div class="prompt">
        <span class="p-user">guest</span><span class="p-at">@</span><span class="p-host">shail.dev</span><span class="p-sep">:</span><span class="p-dir">~</span><span class="p-sym">❯</span>
        <span>cd <span style="color:var(--yellow)" id="path"></span></span>
      </div>
      <div class="error">bash: cd: <span id="path2"></span>: No such file or directory</div>
      <div class="big">404</div>
      <div class="msg">Looks like this page doesn't exist.</div>
      <div class="links">
        <a class="btn" href="/">~ go home</a>
      </div>
    </div>
  </div>
  <script>
    var p = location.pathname;
    document.getElementById('path').textContent = p;
    document.getElementById('path2').textContent = p;
  </script>
</body>
</html>
